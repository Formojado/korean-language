<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>韓文全能反應訓練 - 無限題庫</title>
    <style>
        :root {
            --primary: #4f46e5;
            --success: #10b981;
            --error: #f43f5e;
            --text: #1e293b;
            --bg: #f1f5f9;
        }

        * {
            -webkit-tap-highlight-color: transparent !important;
            -webkit-user-select: none !important;
            user-select: none !important;
            outline: none !important;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg);
            touch-action: manipulation;
        }

        .mode-selector {
            margin-bottom: 20px;
            display: flex;
            background: #e2e8f0;
            padding: 6px;
            border-radius: 20px;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .mode-btn {
            padding: 10px 18px;
            border: none;
            border-radius: 15px;
            background: transparent;
            cursor: pointer;
            font-weight: 800;
            color: #64748b;
            transition: 0.2s;
        }

        .mode-btn.active {
            background: white;
            color: var(--primary);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .quiz-container {
            background: white;
            width: 90%;
            max-width: 500px;
            padding: 30px;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1);
            text-align: center;
        }

        #hangul-display {
            font-size: 13rem;
            font-weight: 900;
            margin: 10px 0;
            color: var(--text);
            line-height: 1.2;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 15px;
        }

        button.option {
            padding: 20px;
            font-size: 1.6rem;
            font-weight: 800;
            border: 3px solid #f1f5f9;
            border-radius: 24px;
            background: #ffffff;
            cursor: pointer;
            transition: all 0.1s;
        }

        button.option:focus, button.option:active {
            background: #ffffff;
            outline: none;
        }

        button.correct { background-color: var(--success) !important; color: white !important; border-color: var(--success) !important; }
        button.wrong { background-color: var(--error) !important; color: white !important; border-color: var(--error) !important; }

        .stats { display: flex; justify-content: space-around; font-weight: 700; color: #64748b; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="mode-selector">
        <button id="btn-complex" class="mode-btn active" onclick="setMode('complex')">三部件 (收尾音)</button>
        <button id="btn-syllables" class="mode-btn" onclick="setMode('syllables')">兩部件 (基礎)</button>
        <button id="btn-consonants" class="mode-btn" onclick="setMode('consonants')">子音</button>
        <button id="btn-vowels" class="mode-btn" onclick="setMode('vowels')">母音</button>
    </div>

    <div class="quiz-container">
        <div class="stats">
            <span>Score: <span id="score">0</span></span>
            <span>🔥 <span id="streak">0</span></span>
        </div>
        <div id="hangul-display">?</div>
        <div class="options-grid" id="options"></div>
    </div>

<script>
    // 基礎部件與羅馬拼音對照
    const chosung = [
        {h:'ㄱ', r:'g'}, {h:'ㄴ', r:'n'}, {h:'ㄷ', r:'d'}, {h:'ㄹ', r:'r'},
        {h:'ㅁ', r:'m'}, {h:'ㅂ', r:'b'}, {h:'ㅅ', r:'s'}, {h:'ㅇ', r:''},
        {h:'ㅈ', r:'j'}, {h:'ㅊ', r:'ch'}, {h:'ㅋ', r:'k'}, {h:'ㅌ', r:'t'},
        {h:'ㅍ', r:'p'}, {h:'ㅎ', r:'h'}
    ];
    const jungsung = [
        {h:'ㅏ', r:'a'}, {h:'ㅑ', r:'ya'}, {h:'ㅓ', r:'eo'}, {h:'ㅕ', r:'yeo'},
        {h:'ㅗ', r:'o'}, {h:'ㅛ', r:'yo'}, {h:'ㅜ', r:'u'}, {h:'ㅠ', r:'yu'},
        {h:'ㅡ', r:'eu'}, {h:'ㅣ', r:'i'}, {h:'ㅐ', r:'ae'}, {h:'ㅔ', r:'e'}
    ];
    const jongsung = [
        {h:'', r:''}, {h:'ㄱ', r:'k'}, {h:'ㄴ', r:'n'}, {h:'ㄷ', r:'t'},
        {h:'ㄹ', r:'l'}, {h:'ㅁ', r:'m'}, {h:'ㅂ', r:'p'}, {h:'ㅇ', r:'ng'}
    ];

    let currentMode = 'complex';
    let score = 0;
    let streak = 0;

    function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${mode}`).classList.add('active');
        nextQuestion();
    }

    // 生成隨機韓文字
    function generateHangul(hasBatchim) {
        const cIdx = Math.floor(Math.random() * chosung.length);
        const vIdx = Math.floor(Math.random() * jungsung.length);
        const c = chosung[cIdx];
        const v = jungsung[vIdx];
        
        let charCode = 44032 + (cIdx * 588) + (vIdx * 28);
        let roman = c.r + v.r;

        if (hasBatchim) {
            const bIdx = Math.floor(Math.random() * (jongsung.length - 1)) + 1; // 跳過空收尾音
            const b = jongsung[bIdx];
            charCode += bIdx;
            roman += b.r;
        }

        // 特殊處理：當ㅇ作為初聲時不發音，但羅馬拼音如果是單獨母音開頭
        if (c.h === 'ㅇ') {
            roman = v.r + (hasBatchim ? jongsung[charCode % 28].r : "");
        }

        return { h: String.fromCharCode(charCode), r: roman };
    }

    function nextQuestion() {
        window.getSelection()?.removeAllRanges();
        document.activeElement?.blur();

        let question;
        if (currentMode === 'consonants') {
            const list = [{h:'ㄱ', r:'g'}, {h:'ㄴ', r:'n'}, {h:'ㄷ', r:'d'}, {h:'ㄹ', r:'r'}, {h:'ㅁ', r:'m'}, {h:'ㅂ', r:'b'}, {h:'ㅅ', r:'s'}, {h:'ㅇ', r:'ng'}, {h:'ㅈ', r:'j'}, {h:'ㅎ', r:'h'}];
            question = list[Math.floor(Math.random() * list.length)];
        } else if (currentMode === 'vowels') {
            const list = jungsung;
            question = list[Math.floor(Math.random() * list.length)];
        } else if (currentMode === 'syllables') {
            question = generateHangul(false);
        } else {
            question = generateHangul(true);
        }

        document.getElementById('hangul-display').innerText = question.h;

        // 產生選項
        let choices = [question.r];
        while (choices.length < 4) {
            let fake;
            if (currentMode === 'consonants' || currentMode === 'vowels') {
                fake = (currentMode === 'consonants' ? chosung : jungsung)[Math.floor(Math.random() * 10)].r;
            } else {
                fake = generateHangul(currentMode === 'complex').r;
            }
            if (!choices.includes(fake) && fake !== "") choices.push(fake);
        }
        choices.sort(() => Math.random() - 0.5);

        const container = document.getElementById('options');
        container.innerHTML = '';
        choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.innerText = choice;
            btn.onpointerdown = (e) => {
                e.preventDefault();
                checkAnswer(choice, btn, question.r);
            };
            container.appendChild(btn);
        });
    }

    function checkAnswer(selected, btn, correctR) {
        const buttons = document.querySelectorAll('.option');
        if (buttons[0].style.pointerEvents === 'none') return;
        buttons.forEach(b => b.style.pointerEvents = 'none');

        if (selected === correctR) {
            btn.classList.add('correct');
            score += 10;
            streak++;
            setTimeout(nextQuestion, 200);
        } else {
            btn.classList.add('wrong');
            streak = 0;
            buttons.forEach(b => {
                if (b.innerText === correctR) b.classList.add('correct');
            });
            setTimeout(nextQuestion, 1200);
        }
        document.getElementById('score').innerText = score;
        document.getElementById('streak').innerText = streak;
    }

    nextQuestion();
</script>

</body>
</html>
