<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>韓文反應力訓練 Pro</title>
    <style>
        :root {
            --primary: #6366f1;
            --success: #22c55e;
            --error: #ef4444;
            --text: #1f2937;
            --bg: #f3f4f6;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
        }

        /* 模式切換區 */
        .mode-container {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            background: #fff;
            padding: 8px;
            border-radius: 50px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .mode-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            background: transparent;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            color: #666;
        }

        .mode-btn.active {
            background: var(--primary);
            color: white;
        }

        /* 主容器 */
        .quiz-card {
            background: white;
            width: 95%;
            max-width: 500px;
            padding: 40px;
            border-radius: 32px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* 超大題目區 */
        #hangul-display {
            font-size: 12rem; /* 極大字體 */
            font-weight: 900;
            margin: 10px 0;
            line-height: 1;
            color: var(--text);
            text-shadow: 2px 2px 0px #eee;
        }

        /* 選項區 */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 40px;
        }

        button.option {
            padding: 20px;
            font-size: 1.5rem;
            font-weight: 600;
            border: 3px solid #e5e7eb;
            border-radius: 20px;
            background: white;
            cursor: pointer;
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }

        button.option:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        button.option:active {
            transform: scale(0.95);
        }

        button.correct {
            background-color: var(--success) !important;
            color: white !important;
            border-color: var(--success) !important;
        }

        button.wrong {
            background-color: var(--error) !important;
            color: white !important;
            border-color: var(--error) !important;
        }

        /* 統計區 */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .streak-count {
            color: #f59e0b;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="mode-container">
        <button class="mode-btn active" onclick="setMode('all', this)">全部</button>
        <button class="mode-btn" onclick="setMode('consonants', this)">子音</button>
        <button class="mode-btn" onclick="setMode('vowels', this)">母音</button>
    </div>

    <div class="quiz-card">
        <div class="stats-bar">
            <span>Score: <b id="score">0</b></span>
            <span class="streak-count">🔥 <span id="streak">0</span></span>
        </div>

        <div id="hangul-display">ㄱ</div>

        <div class="options-grid" id="options">
            </div>
    </div>

<script>
    const data = {
        consonants: [
            { h: 'ㄱ', r: 'g/k' }, { h: 'ㄴ', r: 'n' }, { h: 'ㄷ', r: 'd/t' },
            { h: 'ㄹ', r: 'r/l' }, { h: 'ㅁ', r: 'm' }, { h: 'ㅂ', r: 'b/p' },
            { h: 'ㅅ', r: 's' }, { h: 'ㅇ', r: 'ng' }, { h: 'ㅈ', r: 'j' },
            { h: 'ㅊ', r: 'ch' }, { h: 'ㅋ', r: 'k' }, { h: 'ㅌ', r: 't' },
            { h: 'ㅍ', r: 'p' }, { h: 'ㅎ', r: 'h' }
        ],
        vowels: [
            { h: 'ㅏ', r: 'a' }, { h: 'ㅑ', r: 'ya' }, { h: 'ㅓ', r: 'eo' },
            { h: 'ㅕ', r: 'yeo' }, { h: 'ㅗ', r: 'o' }, { h: 'ㅛ', r: 'yo' },
            { h: 'ㅜ', r: 'u' }, { h: 'ㅠ', r: 'yu' }, { h: 'ㅡ', r: 'eu' },
            { h: 'ㅣ', r: 'i' }, { h: 'ㅐ', r: 'ae' }, { h: 'ㅔ', r: 'e' }
        ]
    };

    let currentPool = [...data.consonants, ...data.vowels];
    let currentQuestion = {};
    let score = 0;
    let streak = 0;

    function setMode(mode, btn) {
        // 切換按鈕樣式
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // 切換題庫
        if (mode === 'consonants') currentPool = data.consonants;
        else if (mode === 'vowels') currentPool = data.vowels;
        else currentPool = [...data.consonants, ...data.vowels];

        nextQuestion();
    }

    function nextQuestion() {
        currentQuestion = currentPool[Math.floor(Math.random() * currentPool.length)];
        document.getElementById('hangul-display').innerText = currentQuestion.h;

        let choices = [currentQuestion.r];
        // 從全部資料中挑選干擾項，這樣選項才會更多元
        const allOptions = [...data.consonants, ...data.vowels];
        while (choices.length < 4) {
            let randomR = allOptions[Math.floor(Math.random() * allOptions.length)].r;
            if (!choices.includes(randomR)) choices.push(randomR);
        }

        choices.sort(() => Math.random() - 0.5);

        const optionsContainer = document.getElementById('options');
        optionsContainer.innerHTML = '';
        choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.innerText = choice;
            btn.onclick = () => checkAnswer(choice, btn);
            optionsContainer.appendChild(btn);
        });
    }

    function checkAnswer(selected, btn) {
        const buttons = document.querySelectorAll('.option');
        buttons.forEach(b => b.style.pointerEvents = 'none');

        if (selected === currentQuestion.r) {
            btn.classList.add('correct');
            score += 10;
            streak++;
            document.getElementById('score').innerText = score;
            document.getElementById('streak').innerText = streak;
            setTimeout(nextQuestion, 300); // 答對時切換超快，訓練直覺
        } else {
            btn.classList.add('wrong');
            streak = 0;
            document.getElementById('streak').innerText = streak;
            
            buttons.forEach(b => {
                if (b.innerText === currentQuestion.r) b.classList.add('correct');
            });
            setTimeout(nextQuestion, 1000); // 答錯停 1 秒讓你記住
        }
    }

    // 初始化
    nextQuestion();
</script>

</body>
</html>
