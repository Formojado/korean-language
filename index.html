<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>韓文字母快速反應練習</title>
    <style>
        :root {
            --primary-color: #5d5cde;
            --success-color: #2ecc71;
            --error-color: #e74c3c;
            --bg-color: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
        }

        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
        }

        #hangul-display {
            font-size: 8rem;
            font-weight: bold;
            margin: 20px 0;
            color: #333;
            min-height: 160px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            padding: 15px;
            font-size: 1.2rem;
            border: 2px solid #ddd;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            border-color: var(--primary-color);
            background-color: #f0f0ff;
        }

        button.correct {
            background-color: var(--success-color);
            color: white;
            border-color: var(--success-color);
        }

        button.wrong {
            background-color: var(--error-color);
            color: white;
            border-color: var(--error-color);
        }

        .stats {
            margin-top: 20px;
            display: flex;
            justify-content: space-around;
            color: #666;
        }

        .streak {
            color: #e67e22;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="stats">
        <div>得分: <span id="score">0</span></div>
        <div class="streak">連擊: <span id="streak">0</span></div>
    </div>
    
    <div id="hangul-display">?</div>
    
    <div class="options-grid" id="options">
        </div>
</div>

<script>
    const hangulData = [
        // 子音
        { h: 'ㄱ', r: 'g/k' }, { h: 'ㄴ', r: 'n' }, { h: 'ㄷ', r: 'd/t' },
        { h: 'ㄹ', r: 'r/l' }, { h: 'ㅁ', r: 'm' }, { h: 'ㅂ', r: 'b/p' },
        { h: 'ㅅ', r: 's' }, { h: 'ㅇ', r: 'ng' }, { h: 'ㅈ', r: 'j' },
        { h: 'ㅊ', r: 'ch' }, { h: 'ㅋ', r: 'k' }, { h: 'ㅌ', r: 't' },
        { h: 'ㅍ', r: 'p' }, { h: 'ㅎ', r: 'h' },
        // 母音
        { h: 'ㅏ', r: 'a' }, { h: 'ㅑ', r: 'ya' }, { h: 'ㅓ', r: 'eo' },
        { h: 'ㅕ', r: 'yeo' }, { h: 'ㅗ', r: 'o' }, { h: 'ㅛ', r: 'yo' },
        { h: 'ㅜ', r: 'u' }, { h: 'ㅠ', r: 'yu' }, { h: 'ㅡ', r: 'eu' },
        { h: 'ㅣ', r: 'i' }
    ];

    let currentQuestion = {};
    let score = 0;
    let streak = 0;

    function initGame() {
        nextQuestion();
    }

    function nextQuestion() {
        // 隨機選一個題目
        currentQuestion = hangulData[Math.floor(Math.random() * hangulData.length)];
        document.getElementById('hangul-display').innerText = currentQuestion.h;

        // 產生選項 (1個正確 + 3個隨機錯誤)
        let choices = [currentQuestion.r];
        while (choices.length < 4) {
            let randomChar = hangulData[Math.floor(Math.random() * hangulData.length)].r;
            if (!choices.includes(randomChar)) {
                choices.push(randomChar);
            }
        }

        // 打亂選項順序
        choices.sort(() => Math.random() - 0.5);

        // 渲染按鈕
        const optionsContainer = document.getElementById('options');
        optionsContainer.innerHTML = '';
        choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.innerText = choice;
            btn.onclick = () => checkAnswer(choice, btn);
            optionsContainer.appendChild(btn);
        });
    }

    function checkAnswer(selected, btn) {
        const buttons = document.querySelectorAll('#options button');
        // 禁用所有按鈕防止連點
        buttons.forEach(b => b.style.pointerEvents = 'none');

        if (selected === currentQuestion.r) {
            btn.classList.add('correct');
            score += 10;
            streak++;
            document.getElementById('score').innerText = score;
            document.getElementById('streak').innerText = streak;
            
            // 答對後稍微延遲就進入下一題，保持節奏
            setTimeout(nextQuestion, 400);
        } else {
            btn.classList.add('wrong');
            streak = 0; // 斷連擊
            document.getElementById('streak').innerText = streak;
            
            // 找尋正確答案並標示
            buttons.forEach(b => {
                if (b.innerText === currentQuestion.r) {
                    b.classList.add('correct');
                }
            });

            // 答錯停留久一點讓你記憶
            setTimeout(nextQuestion, 1200);
        }
    }

    initGame();
</script>

</body>
</html>
